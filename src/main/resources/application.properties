spring.application.name=file-manager-service
server.port=${PORT:8082}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

soap.service.url=${SOAP_SERVICE_URL:http://localhost:8080/ws}
frontend.url=${FRONTEND_URL:http://localhost:5500}
EMAILER_SERVICE_URL=${EMAILER_SERVICE_URL:http://emailer-service:8083/emails}

spaces.access-key=${S3_ACCESS_KEY}
spaces.secret-key=${S3_SECRET_KEY}
spaces.region=${S3_REGION:sgp1}
spaces.endpoint=${S3_ENDPOINT}
spaces.bucket=${S3_BUCKET}
